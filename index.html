<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Збір на шини для військових</title>
  <meta name="description" content="Збір на комплект автомобільних шин для службового автомобіля.">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      overscroll-behavior: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .page {
      position: relative;
      width: min(100vw, 709px);
      aspect-ratio: 709/1122;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
    }
    .poster {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      user-select: none;
      -webkit-user-drag: none;
    }
    .hotspot {
      position: absolute;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      border-radius: 8px;
      -webkit-tap-highlight-color: rgba(0,0,0,.18);
    }
    .hotspot:focus-visible {
      outline: 3px solid #111;
      outline-offset: 2px;
      background: rgba(255,255,255,.15);
    }
    .hotspot:active {
      background: rgba(0,0,0,.12);
      transform: scale(.99);
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(24px + env(safe-area-inset-bottom));
      transform: translate(-50%, 18px);
      z-index: 100;
      max-width: calc(100vw - 32px);
      padding: 12px 18px;
      border-radius: 999px;
      color: #fff;
      background: rgba(0,0,0,.88);
      font-size: 15px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      box-shadow: 0 8px 28px rgba(0,0,0,.35);
    }
    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }
    @media (min-width: 710px) {
      body { padding: 20px 0; }
      .page { box-shadow: 0 0 40px rgba(255,255,255,.10); }
    }
  </style>
</head>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const toast = document.getElementById('toast');
    let toastTimer;

    function showToast(message) {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1700);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const area = document.createElement('textarea');
        area.value = text;
        area.style.position = 'fixed';
        area.style.opacity = '0';
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      }
      showToast('Скопійовано');
    }

    document.querySelectorAll('[data-copy]').forEach(button => {
      button.addEventListener('click', () => copyText(button.dataset.copy));
    });

    const shareText = 'Збір на шини для військових. Ціль — 30 000 грн. Картка: 4149 5110 2819 7408';
    const pageUrl = location.protocol === 'file:' ? '' : location.href;

    document.querySelectorAll('.share').forEach(button => {
      button.addEventListener('click', async () => {
        const text = encodeURIComponent(shareText);
        const url = encodeURIComponent(pageUrl);
        const network = button.dataset.network;

        if (network === 'telegram') location.href = `https://t.me/share/url?url=${url}&text=${text}`;
        if (network === 'viber') location.href = `viber://forward?text=${text}%20${url}`;
        if (network === 'whatsapp') location.href = `https://wa.me/?text=${text}%20${url}`;
        if (network === 'facebook') {
          if (pageUrl) location.href = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
          else if (navigator.share) await navigator.share({ title: document.title, text: shareText });
          else {
            await copyText(shareText);
            showToast('Текст для поширення скопійовано');
          }
        }
      });
    });
  </script>
